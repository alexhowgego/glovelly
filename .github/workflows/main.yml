name: Glovelly CI/CD

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "backend/**"
      - "frontend/**"
      - "glovelly.sln"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/main.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "backend/**"
      - "frontend/**"
      - "glovelly.sln"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: glovelly-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

  GAR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
  GAR_REPOSITORY: glovelly
  IMAGE_NAME: glovelly
  CLOUD_RUN_SERVICE: glovelly
  CLOUD_RUN_STAGING_SERVICE: glovelly-staging

  IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/glovelly/glovelly

jobs:
  container:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies
        run: dotnet restore glovelly.sln

      - name: Run backend tests
        run: dotnet test glovelly.sln --no-restore -m:1

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Capture build timestamp
        id: build_time
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to Artifact Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_URI }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push container image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT_ID=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.build_time.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_URI }}:sha-${{ github.sha }}
          env_vars: |-
            App__DeploymentName=Production
            Email__Mode=Resend
            Email__AccessRequests__FromDisplayName=Glovelly
            Email__Invoices__FromDisplayName=Glovelly
          secrets: |-
            Authentication__Google__ClientId=google-client-id:latest
            Authentication__Google__ClientSecret=google-client-secret:latest
            ConnectionStrings__Glovelly=glovelly-connection-string:latest
            Email__Resend__ApiKey=glovelly-resend-api-key:latest
            Email__AccessRequests__FromAddress=glovelly-access-requests-from-address:latest
            Email__Invoices__FromAddress=glovelly-invoices-from-address:latest
          secrets_update_strategy: merge
          flags: >-
            --allow-unauthenticated
            --service-account=glovelly-runner@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Show deployed URL
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

      - name: Deploy PR staging service
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: deploy_pr
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_STAGING_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_URI }}:sha-${{ github.sha }}
          env_vars: |-
            App__DeploymentName=Staging
            Email__Mode=Resend
            Email__AccessRequests__FromDisplayName=Glovelly
            Email__Invoices__FromDisplayName=Glovelly
          secrets: |-
            Authentication__Google__ClientId=google-client-id:latest
            Authentication__Google__ClientSecret=google-client-secret:latest
            ConnectionStrings__Glovelly=glovelly-connection-string-staging:latest
            Email__Resend__ApiKey=glovelly-resend-api-key:latest
            Email__AccessRequests__FromAddress=glovelly-access-requests-from-address:latest
            Email__Invoices__FromAddress=glovelly-invoices-from-address:latest
          secrets_update_strategy: merge
          flags: >-
            --allow-unauthenticated
            --service-account=glovelly-runner@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Comment staging URL on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          STAGING_URL: ${{ steps.deploy_pr.outputs.url }}
        with:
          script: |
            const marker = "<!-- glovelly-staging-preview -->";
            const body = `${marker}
            🚀 Staging preview is ready: ${process.env.STAGING_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
