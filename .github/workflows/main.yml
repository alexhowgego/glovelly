name: Glovelly CI/CD

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/main.yml"
      - ".github/workflows/uat.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "glovelly.sln"
      - "verify.sh"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/main.yml"
      - ".github/workflows/uat.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "glovelly.sln"
      - "verify.sh"
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: glovelly-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

  GAR_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
  GAR_REPOSITORY: glovelly
  IMAGE_NAME: glovelly

  IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/glovelly/glovelly

jobs:
  build:
    name: Build and test image
    runs-on: ubuntu-latest
    environment: staging

    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET dependencies
        run: dotnet restore glovelly.sln

      - name: Run backend tests
        run: dotnet test glovelly.sln --no-restore -m:1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/glovelly-web/package-lock.json

      - name: Restore frontend dependencies
        run: npm --prefix frontend/glovelly-web ci

      - name: Run frontend lint
        run: npm --prefix frontend/glovelly-web run lint

      - name: Build frontend
        run: npm --prefix frontend/glovelly-web run build

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Capture build timestamp
        id: build_time
        run: echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to Artifact Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_URI }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Capture deployable image URI
        id: image
        run: echo "uri=${IMAGE_URI}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and optionally push container image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT_ID=${{ github.sha }}
            BUILD_TIMESTAMP=${{ steps.build_time.outputs.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_staging:
    name: Deploy staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production' && github.ref == 'refs/heads/main')

    outputs:
      url: ${{ steps.deploy_staging.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run staging
        id: deploy_staging
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          env_vars: |-
            App__DeploymentName=${{ vars.DEPLOYMENT_NAME }}
            BlobStorage__BucketName=${{ vars.GCP_BUCKET_NAME }}
            Email__Mode=Resend
            Email__AccessRequests__FromDisplayName=Glovelly
            Email__Invoices__FromDisplayName=Glovelly
            Email__UserInvitations__FromDisplayName=Glovelly
            ExpenseAttachments__BucketName=${{ vars.GCP_BUCKET_NAME }}
            Mcp__OAuth__Issuer=${{ vars.DEPLOYMENT_URL }}
            Mcp__OAuth__Resource=${{ vars.DEPLOYMENT_URL }}/mcp
            Mcp__OAuth__Clients__0__DisplayName=ChatGPT
            Mcp__OAuth__Clients__0__Scopes__0=mcp:read
          secrets: |-
            Authentication__Google__ClientId=google-client-id:latest
            Authentication__Google__ClientSecret=google-client-secret:latest
            ConnectionStrings__Glovelly=${{ vars.GCP_CONNECTION_STRING_SECRET_ID }}:latest
            Email__Resend__ApiKey=glovelly-resend-api-key:latest
            Email__AccessRequests__FromAddress=glovelly-access-requests-from-address:latest
            Email__Invoices__FromAddress=glovelly-invoices-from-address:latest
            Email__UserInvitations__FromAddress=glovelly-access-requests-from-address:latest
            Mileage__GoogleRoutes__ApiKey=glovelly-routes-api-key:latest
            Mcp__OAuth__Clients__0__ClientId=chatgpt-oauth-client-id:latest
            Mcp__OAuth__Clients__0__ClientSecret=chatgpt-oauth-client-secret:latest
            Mcp__OAuth__Clients__0__RedirectUris__0=${{ vars.GCP_CHATGPT_REDIRECT_SECRET_ID }}:latest
            GLOVELLY_UAT_SECRET=${{ vars.GCP_UAT_SECRET_ID }}:latest
          secrets_update_strategy: merge
          flags: >-
            --allow-unauthenticated
            --service-account=glovelly-runner@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --timeout=3600s
            --max-instances=1

      - name: Show staging URL
        run: echo "Deployed staging to ${{ steps.deploy_staging.outputs.url }}"

      - name: Deploy Calendar sync job staging
        env:
          IMAGE_URI: ${{ needs.build.outputs.image_uri }}
          DEPLOYMENT_NAME: ${{ vars.DEPLOYMENT_NAME }}
          DEPLOYMENT_URL: ${{ vars.DEPLOYMENT_URL }}
          GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_NAME }}
          GCP_CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          GCP_CONNECTION_STRING_SECRET_ID: ${{ vars.GCP_CONNECTION_STRING_SECRET_ID }}
          GCP_CHATGPT_REDIRECT_SECRET_ID: ${{ vars.GCP_CHATGPT_REDIRECT_SECRET_ID }}
          GCP_UAT_SECRET_ID: ${{ vars.GCP_UAT_SECRET_ID }}
          CALENDAR_SYNC_JOB_NAME: ${{ vars.GCP_CALENDAR_SYNC_JOB_NAME }}
          CALENDAR_SYNC_SCHEDULER_NAME: ${{ vars.GCP_CALENDAR_SYNC_SCHEDULER_NAME }}
          CALENDAR_SYNC_SCHEDULE: ${{ vars.CALENDAR_SYNC_SCHEDULE }}
          GCP_SCHEDULER_LOCATION: ${{ vars.GCP_SCHEDULER_LOCATION }}
        run: bash .github/scripts/deploy-calendar-sync-job.sh

      - name: Comment staging URL on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          STAGING_URL: ${{ steps.deploy_staging.outputs.url }}
        with:
          script: |
            const marker = "<!-- glovelly-staging-preview -->";
            const body = `${marker}
            🚀 Staging preview is ready: ${process.env.STAGING_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  staging_uat:
    name: Run staging UAT
    needs: deploy_staging
    uses: ./.github/workflows/uat.yml
    with:
      environment_name: staging
      require_uat_secret: true
      require_invoice_recipient: true
      artifact_name: glovelly-staging-uat-diagnostics

  deploy_production:
    name: Deploy production
    needs:
      - build
      - staging_uat
    runs-on: ubuntu-latest
    environment: production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production' && github.ref == 'refs/heads/main')

    outputs:
      url: ${{ steps.deploy_production.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run production
        id: deploy_production
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          env_vars: |-
            App__DeploymentName=${{ vars.DEPLOYMENT_NAME }}
            BlobStorage__BucketName=${{ vars.GCP_BUCKET_NAME }}
            Email__Mode=Resend
            Email__AccessRequests__FromDisplayName=Glovelly
            Email__Invoices__FromDisplayName=Glovelly
            Email__UserInvitations__FromDisplayName=Glovelly
            ExpenseAttachments__BucketName=${{ vars.GCP_BUCKET_NAME }}
            Mcp__OAuth__Issuer=${{ vars.DEPLOYMENT_URL }}
            Mcp__OAuth__Resource=${{ vars.DEPLOYMENT_URL }}/mcp
            Mcp__OAuth__Clients__0__DisplayName=ChatGPT
            Mcp__OAuth__Clients__0__Scopes__0=mcp:read
          secrets: |-
            Authentication__Google__ClientId=google-client-id:latest
            Authentication__Google__ClientSecret=google-client-secret:latest
            ConnectionStrings__Glovelly=${{ vars.GCP_CONNECTION_STRING_SECRET_ID }}:latest
            Email__Resend__ApiKey=glovelly-resend-api-key:latest
            Email__AccessRequests__FromAddress=glovelly-access-requests-from-address:latest
            Email__Invoices__FromAddress=glovelly-invoices-from-address:latest
            Email__UserInvitations__FromAddress=glovelly-access-requests-from-address:latest
            Mileage__GoogleRoutes__ApiKey=glovelly-routes-api-key:latest
            Mcp__OAuth__Clients__0__ClientId=chatgpt-oauth-client-id:latest
            Mcp__OAuth__Clients__0__ClientSecret=chatgpt-oauth-client-secret:latest
            Mcp__OAuth__Clients__0__RedirectUris__0=${{ vars.GCP_CHATGPT_REDIRECT_SECRET_ID }}:latest
          secrets_update_strategy: merge
          flags: >-
            --allow-unauthenticated
            --service-account=glovelly-runner@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --timeout=3600s
            --max-instances=1

      - name: Show production URL
        run: echo "Deployed production to ${{ steps.deploy_production.outputs.url }}"

      - name: Deploy Calendar sync job production
        env:
          IMAGE_URI: ${{ needs.build.outputs.image_uri }}
          DEPLOYMENT_NAME: ${{ vars.DEPLOYMENT_NAME }}
          DEPLOYMENT_URL: ${{ vars.DEPLOYMENT_URL }}
          GCP_BUCKET_NAME: ${{ vars.GCP_BUCKET_NAME }}
          GCP_CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          GCP_CONNECTION_STRING_SECRET_ID: ${{ vars.GCP_CONNECTION_STRING_SECRET_ID }}
          GCP_CHATGPT_REDIRECT_SECRET_ID: ${{ vars.GCP_CHATGPT_REDIRECT_SECRET_ID }}
          CALENDAR_SYNC_JOB_NAME: ${{ vars.GCP_CALENDAR_SYNC_JOB_NAME }}
          CALENDAR_SYNC_SCHEDULER_NAME: ${{ vars.GCP_CALENDAR_SYNC_SCHEDULER_NAME }}
          CALENDAR_SYNC_SCHEDULE: ${{ vars.CALENDAR_SYNC_SCHEDULE }}
          GCP_SCHEDULER_LOCATION: ${{ vars.GCP_SCHEDULER_LOCATION }}
        run: bash .github/scripts/deploy-calendar-sync-job.sh

  production_smoke:
    name: Run production smoke tests
    needs: deploy_production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/uat.yml
    with:
      environment_name: production
      test_filter: Suite=Smoke
      require_uat_secret: false
      require_invoice_recipient: false
      artifact_name: glovelly-production-smoke-diagnostics
